name: E2E Tests (Playwright)

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, 'feature/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lock file integrity check ────────────────────────────────────────────
  lock-check:
    name: Lock File Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      # 핌스트 체크: package-lock.json이 존재하고 package.json을 참조하는지 확인
      # npm install --package-lock-only 방식은 Node 버전마다 lockfileVersion이
      # 달라져 항상 diff가 발생하므로 사용하지 않습니다.
      # 대신 npm install --legacy-peer-deps로 설치하고
      # node_modules와 lock이 일치하는지 dry-run으로 확인합니다.
      - name: Verify lock is in sync with package.json
        run: |
          # package-lock.json이 없으면 에러
          if [ ! -f package-lock.json ]; then
            echo "❌ package-lock.json이 없습니다. npm install --legacy-peer-deps 후 커밋해주세요."
            exit 1
          fi

          # 실제 설치를 시도하여 ERESOLVE 등 충돌 내용이 있는지 확인
          npm install --legacy-peer-deps --dry-run 2>&1 | head -20 || true

          # 주요 체크: package.json의 의존성이 lock에 모두 있는지
          # (node_modules 없이 jq로 package.json dependencies 키를 lock과 비교)
          node -e "
            const pkg = require('./package.json');
            const lock = require('./package-lock.json');
            const allDeps = Object.keys({
              ...(pkg.dependencies || {}),
              ...(pkg.devDependencies || {})
            });
            const lockPkgs = lock.packages || {};
            const missing = allDeps.filter(dep => {
              const key = 'node_modules/' + dep;
              return !lockPkgs[key];
            });
            if (missing.length > 0) {
              console.error('❌ package-lock.json에 누락된 패키지:');
              missing.forEach(m => console.error('  -', m));
              console.error('');
              console.error('플로칼에서 실행: npm install --legacy-peer-deps');
              console.error('그 후: git add package-lock.json && git push');
              process.exit(1);
            }
            console.log('✅ package-lock.json이 package.json과 동기화되어 있습니다 (' + allDeps.length + '개 패키지 확인)');
          "

  # ── Job 2: E2E test suite ────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (Next.js 16 canary)
        run: npm run build
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      - name: E2E tests
        run: npx playwright test --project=chromium
        env:
          CI:                   'true'
          PLAYWRIGHT_BASE_URL:  http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ── Job 3: TypeScript check ────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
