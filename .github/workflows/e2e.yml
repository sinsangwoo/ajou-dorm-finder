name: E2E Tests (Playwright)

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, 'feature/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lock file 자동 재생성 ───────────────────────────────────────────
  sync-lockfile:
    name: Sync Lock File
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
      - name: Regenerate package-lock.json
        run: npm install --legacy-peer-deps
      - name: Commit updated lock file (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package-lock.json; then
            echo "✅ package-lock.json 이미 최신 — 코밋 스킵"
          else
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
            echo "✅ package-lock.json 업데이트 코밋 완료"
          fi

  # ── Job 2: TypeScript check ────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: sync-lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit

  # ── Job 3: E2E test suite ────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      # ① npm start (next start) 로 프로덕션 서버 백그라운드 실행
      # output: 'standalone'을 제거함으로써 일반 next start 사용 가능
      - name: Start server (background)
        run: |
          nohup npm start -- -p 3000 -H 0.0.0.0 > /tmp/next-server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      # ② TCP 포트가 열릴 때까지 대기 (연결 성공 = HTTP 지정 코드 실제 응답)
      - name: Wait for server to be ready
        run: |
          echo "🔄 서버 응답 대기 중 (http://localhost:3000)..."
          for i in $(seq 1 45); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "✅ 서버 준비 완료 — HTTP $STATUS ($((i*2))초 소요)"
              exit 0
            fi
            if [ $((i % 5)) -eq 0 ]; then
              echo "--- 서버 로그 (${i}x2초) ---"
              tail -15 /tmp/next-server.log 2>/dev/null || true
            fi
            sleep 2
          done
          echo "❌ 90초 후에도 서버가 응답하지 않습니다"
          echo "--- 전체 서버 로그 ---"
          cat /tmp/next-server.log 2>/dev/null || true
          exit 1

      # ③ E2E 테스트 실행
      - name: E2E tests
        run: npx playwright test --project=chromium
        env:
          CI:                  'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
