name: E2E Tests (Playwright)

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, 'feature/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lock file integrity check ──────────────────────────────────────
  lock-check:
    name: Lock File Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'
      - name: Verify lock is in sync with package.json
        run: |
          npm install --package-lock-only --legacy-peer-deps
          git diff --exit-code package-lock.json || (
            echo "" &&
            echo "╔════════════════════════════════════════════════════╗" &&
            echo "║ package-lock.json 이 package.json 과 다릅니다!         ║" &&
            echo "║ 로컈에서 실행: npm install --legacy-peer-deps      ║" &&
            echo "║ 그 후: git add package-lock.json && git push      ║" &&
            echo "╚════════════════════════════════════════════════════╝" &&
            exit 1
          )

  # ── Job 2: E2E test suite ────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      # npm install: lock 파일이 유효하면 그대로, 아니면 재체계
      # --legacy-peer-deps: React 19 범위 선언 안한 패키지와의 ERESOLVE 방지
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (Next.js 16 canary)
        run: npm run build
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      - name: E2E tests
        run: npx playwright test --project=chromium
        env:
          CI:                   'true'
          PLAYWRIGHT_BASE_URL:  http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ── Job 3: TypeScript check ────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
