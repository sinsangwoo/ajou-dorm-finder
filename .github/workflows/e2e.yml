name: E2E Tests (Playwright)

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, 'feature/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lock file 자동 재생성 & 코어 마스터 브랜치에 코미───────────
  # 로컴에서 npm install을 돌리지 않아도 lock파일이 항상 최신으로 유지됩니다.
  sync-lockfile:
    name: Sync Lock File
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # main 브랜치로의 push 또는 main 대상 PR일 때만 실행
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # 코미하려면 효 토큰이 필요
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Regenerate package-lock.json
        run: npm install --legacy-peer-deps

      - name: Commit updated lock file (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package-lock.json; then
            echo "✅ package-lock.json 이미 실제 있음 — 코미 스킵"
          else
            echo "프로 코미 시작하는 중..."
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
            echo "✅ package-lock.json 업데이트 코미 완료"
          fi

  # ── Job 2: E2E test suite ────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: sync-lockfile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      - name: E2E tests
        run: npx playwright test --project=chromium
        env:
          CI:                  'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ── Job 3: TypeScript check ────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: sync-lockfile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit
