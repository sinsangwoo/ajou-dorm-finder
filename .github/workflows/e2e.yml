name: E2E Tests (Playwright)

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, 'feature/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lock file 자동 재생성 ───────────────────────────────────────────
  sync-lockfile:
    name: Sync Lock File
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Regenerate package-lock.json
        run: npm install --legacy-peer-deps

      - name: Commit updated lock file (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package-lock.json; then
            echo "✅ package-lock.json 이미 최신 — 코밋 스킵"
          else
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
            echo "✅ package-lock.json 업데이트 코밋 완료"
          fi

  # ── Job 2: TypeScript check ────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: sync-lockfile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

  # ── Job 3: E2E test suite ────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      # ① 빌드된 앱을 백그라운드에서 실행
      # output: 'standalone' 빌드에서는 .next/standalone/server.js 를 직접 실행합니다.
      # 일반 `next start` 는 node_modules가 필요하지만
      # standalone 모드는 독립적으로 실행되므로 을 사용합니다.
      - name: Start server (background)
        run: |
          # standalone 빌드를 public 설정과 함께 시작
          # (public/ 폴더는 standalone에 포함되지 않으므로 링크 필요)
          cp -r public .next/standalone/public 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
          PORT=3000 node .next/standalone/server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        env:
          PORT: 3000
          HOSTNAME: 0.0.0.0
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      # ② 서버가 실제로 응답할 때까지 대기
      # 최대 60초 동안 2초 간격으로 HTTP 200을 확인
      - name: Wait for server
        run: |
          echo "🔄 서버 응답 대기 중 (http://localhost:3000)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ 서버 준비 완료 ($((i*2))초 소요)"
              exit 0
            fi
            sleep 2
          done
          echo "❌ 60초 후에도 서버가 응답하지 않습니다"
          exit 1

      # ③ E2E 테스트 실행
      - name: E2E tests
        run: npx playwright test --project=chromium
        env:
          CI:                  'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
