name: E2E Tests (Playwright)

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, 'feature/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lock file 자동 재생성 ───────────────────────────────────────────
  sync-lockfile:
    name: Sync Lock File
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Regenerate package-lock.json
        run: npm install --legacy-peer-deps

      - name: Commit updated lock file (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package-lock.json; then
            echo "✅ package-lock.json 이미 최신 — 코밋 스킵"
          else
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
            echo "✅ package-lock.json 업데이트 코밋 완료"
          fi

  # ── Job 2: TypeScript check ────────────────────────────────────────────────
  # 빌드보다 먼저 실행: .next/ 폴더가 없는 상태에서 src 소스만 검사합니다.
  # tsconfig.json의 exclude에 .next가 있으므로 dev 타입 잔재물에 영향받지 않습니다.
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: sync-lockfile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

  # ── Job 3: E2E test suite ──────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TENANT_ID: ajou
          NEXT_PUBLIC_SITE_URL:  http://localhost:3000

      - name: E2E tests
        run: npx playwright test --project=chromium
        env:
          CI:                  'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
